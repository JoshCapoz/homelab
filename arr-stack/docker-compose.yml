services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - /opt/docker/arr-stack/gluetun:/gluetun
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: "${WIREGUARD_PRIVATE_KEY}"
      WIREGUARD_ADDRESSES: "${WIREGUARD_ADDRESSES}"
      SERVER_COUNTRIES: ""
      VPN_PORT_FORWARDING: "on"
      FIREWALL_OUTBOUND_SUBNETS: "192.168.60.0/24"
      TZ: Australia/Perth
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Perth
      WEBUI_PORT: 8080
    volumes:
      - /opt/docker/arr-stack/qbittorrent:/config
      - /media/Media/downloads:/downloads
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Perth
    volumes:
      - /opt/docker/arr-stack/prowlarr:/config
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Perth
    volumes:
      - /opt/docker/arr-stack/sonarr:/config
      - /media/Media/TVShows:/tv
      - /media/Media/downloads:/downloads
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Australia/Perth
    volumes:
      - /opt/docker/arr-stack/radarr:/config
      - /media/Media/Movies:/movies
      - /media/Media/downloads:/downloads
    restart: unless-stopped
